<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG1 - Pulse Edition</title>
    
    <!-- Подключаем стильный шрифт Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,800;1,800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #07050a;
            --text-color: #e2d8ee;
            /* Фирменный градиент в стиле PulseVisual */
            --accent-gradient: linear-gradient(135deg, #d946ef, #8b5cf6);
            --accent-color: #d946ef;
            --panel-bg: rgba(15, 10, 22, 0.75);
            --border-color: rgba(217, 70, 239, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body, html {
            width: 100%;
            min-height: 100%;
            background-color: var(--bg-color);
            /* Красивый темный фон Майнкрафта с градиентным затемнением */
            background-image: linear-gradient(rgba(7, 5, 10, 0.85), rgba(15, 10, 22, 0.95)), url('https://images.unsplash.com/photo-1607513837920-0fc35b5a79bb?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            padding: 20px;
        }

        /* --- ГЛАВНАЯ ПАНЕЛЬ --- */
        .container {
            text-align: center;
            background: var(--panel-bg);
            padding: 3rem 3.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(217, 70, 239, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            max-width: 520px;
            width: 100%;
            position: relative;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            font-style: italic;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }

        .gradient-text {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(217, 70, 239, 0.5);
        }

        p.subtitle {
            font-size: 1rem;
            color: #a79fc4;
            margin-bottom: 1.5rem; 
            font-weight: 600;
        }

        /* --- ПЛАШКА ELY.BY --- */
        .auth-notice {
            background: rgba(217, 70, 239, 0.1);
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: inline-block;
            box-shadow: 0 0 15px rgba(217, 70, 239, 0.1);
        }
        
        .auth-notice b {
            color: var(--accent-color);
            text-shadow: 0 0 8px rgba(217, 70, 239, 0.4);
        }

        /* --- СТАТУС СЕРВЕРА --- */
        .server-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .status-indicator {
            width: 14px;
            height: 14px;
            background-color: #ff3333;
            border-radius: 50%;
            box-shadow: 0 0 12px #ff3333;
            transition: 0.3s;
        }

        .status-indicator.online {
            background-color: #00ff88;
            box-shadow: 0 0 15px #00ff88;
        }

        .status-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .ip-box {
            font-family: monospace;
            background: rgba(217, 70, 239, 0.15);
            padding: 6px 12px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
            border: 1px solid var(--border-color);
        }

        .ip-box:hover {
            background: rgba(217, 70, 239, 0.25);
            box-shadow: 0 0 15px rgba(217, 70, 239, 0.4);
        }

        .mrpack-info {
            font-size: 0.85rem;
            color: #887e9e;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .mrpack-info b {
            color: #d1c4e9;
        }

        /* --- СЕТКА КНОПОК --- */
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 5px 20px rgba(217, 70, 239, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 8px 25px rgba(217, 70, 239, 0.5);
            transform: translateY(-2px);
        }

        .btn-discord {
            background-color: #5865F2;
            color: #fff;
            box-shadow: 0 5px 20px rgba(88, 101, 242, 0.2);
        }
        .btn-discord:hover {
            background-color: #4752C4;
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.4);
            transform: translateY(-2px);
        }

        .btn-stats {
            background-color: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid rgba(139, 92, 246, 0.4);
        }
        .btn-stats:hover {
            background-color: rgba(139, 92, 246, 0.1);
            border-color: #8b5cf6;
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
        }

        .btn-map {
            background-color: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid rgba(217, 70, 239, 0.4);
        }
        .btn-map:hover {
            background-color: rgba(217, 70, 239, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 5px 20px rgba(217, 70, 239, 0.3);
            transform: translateY(-2px);
        }

        /* --- ВЫПАДАЮЩЕЕ МЕНЮ --- */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%; 
            left: 0;
            width: 100%;
            background-color: rgba(15, 10, 22, 0.95);
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            border: 1px solid var(--border-color);
            overflow: hidden;
            z-index: 10;
        }

        .dropdown-content.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .dropdown-content a {
            color: #e2d8ee;
            padding: 15px 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.2s;
            font-weight: 600;
        }

        .dropdown-content a:last-child {
            border-bottom: none;
        }

        .dropdown-content a:hover {
            background: rgba(217, 70, 239, 0.15);
            color: #fff;
        }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(217, 70, 239, 0.05);
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 25px;
            color: #887e9e;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .close-modal:hover { color: #fff; transform: scale(1.1); }

        .modal-content h2 {
            color: #fff;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- ПОИСК --- */
        .search-box {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 25px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .search-box:focus {
            border-color: var(--accent-color);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 15px rgba(217, 70, 239, 0.2);
        }

        .search-box::placeholder { color: #6b6382; }

        /* --- КАРТОЧКИ СТАТИСТИКИ --- */
        .stats-list {
            display: flex;
            flex-direction: column;
            gap: 20px; 
            overflow-y: auto;
            padding-right: 10px;
            max-height: 55vh;
        }

        .stats-list::-webkit-scrollbar { width: 6px; }
        .stats-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        .stats-list::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }

        .stats-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(217, 70, 239, 0.15);
            border-radius: 16px;
            padding: 18px;
            box-shadow: inset 0 0 20px rgba(217, 70, 239, 0.02);
        }

        .stats-card-title {
            color: var(--accent-color);
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(217, 70, 239, 0.3);
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            padding: 8px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .stat-row:hover { background: rgba(255,255,255,0.03); }
        .stat-row:last-child { margin-bottom: 0; }

        .rank-circle {
            width: 32px; height: 32px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95rem; font-weight: 800; color: #fff;
        }

        .rank-1 { background: var(--accent-gradient); color: #fff; box-shadow: 0 0 15px rgba(217, 70, 239, 0.5); }
        .rank-2 { background: rgba(192, 192, 192, 0.2); color: #c0c0c0; }
        .rank-3 { background: rgba(205, 127, 50, 0.2); color: #cd7f32; }
        .rank-other { background: rgba(255, 255, 255, 0.05); color: #6b6382; }

        .player-avatar { width: 40px; height: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .player-info { display: flex; flex-direction: column; }
        .player-name { color: #fff; font-weight: 800; font-size: 1.1rem; letter-spacing: 0.5px;}
        .player-score { color: #a79fc4; font-size: 0.9rem; font-weight: 600;}

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) { 
            .container { padding: 2rem 1.5rem; } 
            h1 { font-size: 2.2rem; } 
            .buttons-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-panel">
        
        <h1>SERVER <span class="gradient-text">SG1</span></h1>
        <p class="subtitle">Приватный сервер со сборкой для своих</p>
        
        <div class="auth-notice">⚠️ Для входа на сервер нужен аккаунт <b>ely.by</b></div>

        <div class="server-status">
            <div class="status-indicator" id="status-dot"></div>
            <div class="status-text"><span id="player-count">Загрузка...</span></div>
            <div class="ip-box" onclick="copyIP()" title="Нажмите, чтобы скопировать">46.228.121.26:25565</div>
        </div>

        <p class="mrpack-info">Формат сборки <b>.mrpack</b> подходит для лаунчеров <b>PrismLauncher</b>, <b>Modrinth</b> и <b>PineconeMC</b>.</p>
        
        <div class="buttons-grid">
            <!-- Скачивание (На всю ширину) -->
            <div class="dropdown full-width">
                <button class="btn btn-primary" onclick="toggleDropdown(event)">📥 Скачать сборку ▼</button>
                <div class="dropdown-content" id="download-menu">
                    <a href="https://disk.yandex.ru/d/Pq0oYCFJFQ4kEg" target="_blank">💽 Yandex Disk</a>
                    <a href="https://drive.google.com/file/d/1QjouDbjR8oP1-ARN4_njUXevgwYY3Bgy/view?usp=sharing" target="_blank">📁 Google Drive</a>
                    <a href="https://www.mediafire.com/file/jaz9dwaaqrywr37/SMP+1.3.mrpack/file" target="_blank">🔥 MediaFire</a>
                </div>
            </div>
            
            <!-- Статистика и Карта (Рядом друг с другом) -->
            <button class="btn btn-stats" onclick="openStats()">📊 Статистика</button>
            <a href="http://46.228.121.26:8100/" target="_blank" class="btn btn-map">🗺️ Карта</a>
            
            <!-- Дискорд (На всю ширину) -->
            <a href="https://discord.gg/ua8BZs8S" target="_blank" class="btn btn-discord full-width">💬 Наш Discord</a>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО СТАТИСТИКИ -->
    <div class="modal-overlay" id="stats-modal" onclick="closeStatsOnOutside(event)">
        <div class="modal-content">
            <span class="close-modal" onclick="closeStats()">✖</span>
            <h2>Топ игроков</h2>
            
            <input type="text" id="stats-search" class="search-box" placeholder="🔍 Поиск по нику..." oninput="renderStats(this.value)">

            <div class="stats-list" id="stats-container">
                <!-- Карточки подгрузятся сюда -->
            </div>
        </div>
    </div>

    <script>
        const serverIP = '46.228.121.26'; 
        const maxPlayers = 100;

        async function fetchServerStatus() {
            try {
                const response = await fetch(`https://api.mcsrvstat.us/3/${serverIP}`);
                const data = await response.json();
                const dot = document.getElementById('status-dot');
                const countText = document.getElementById('player-count');

                if (data.online) {
                    dot.classList.add('online');
                    countText.innerHTML = `Онлайн: ${data.players.online} / ${maxPlayers}`;
                } else {
                    dot.classList.remove('online');
                    countText.innerHTML = 'Сервер оффлайн';
                }
            } catch (error) {
                document.getElementById('player-count').innerHTML = 'Ошибка';
            }
        }

        function copyIP() {
            const ip = document.querySelector('.ip-box').innerText;
            navigator.clipboard.writeText(ip).then(() => {
                const box = document.querySelector('.ip-box');
                const originalText = box.innerText;
                box.innerText = 'Скопировано!';
                setTimeout(() => box.innerText = originalText, 2000);
            });
        }

        function toggleDropdown(event) {
            event.stopPropagation(); 
            document.getElementById("download-menu").classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.matches('.btn-primary')) {
                const dropdowns = document.getElementsByClassName("dropdown-content");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
                }
            }
        }

        fetchServerStatus();
        setInterval(fetchServerStatus, 60000);

        // --- ДЕМО ДАННЫЕ СТАТИСТИКИ ---
        const fakeStatsData = {
            time: [
                { name: "Notch", score: "5 дн., 1 ч" },
                { name: "Steve", score: "1 дн., 7 ч" },
                { name: "Alex", score: "1 дн., 4 ч" },
                { name: "Herobrine", score: "20 ч" },
                { name: "Jeb_", score: "15 ч" }
            ],
            blocks: [
                { name: "Steve", score: "30 897" },
                { name: "Alex", score: "17 736" },
                { name: "Notch", score: "11 677" },
                { name: "Jeb_", score: "8 400" },
                { name: "Herobrine", score: "666" }
            ]
        };

        function openStats() {
            document.getElementById('stats-modal').classList.add('show');
            document.getElementById('stats-search').value = ''; 
            renderStats(); 
        }

        function closeStats() {
            document.getElementById('stats-modal').classList.remove('show');
        }

        function closeStatsOnOutside(event) {
            if (event.target === document.getElementById('stats-modal')) closeStats();
        }

        function renderStats(query = '') {
            const container = document.getElementById('stats-container');
            container.innerHTML = ''; 
            const lowerQuery = query.toLowerCase();

            const filteredTime = query 
                ? fakeStatsData.time.filter(p => p.name.toLowerCase().includes(lowerQuery))
                : fakeStatsData.time.slice(0, 3);
                
            const filteredBlocks = query 
                ? fakeStatsData.blocks.filter(p => p.name.toLowerCase().includes(lowerQuery))
                : fakeStatsData.blocks.slice(0, 3);

            if (filteredTime.length === 0 && filteredBlocks.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 20px; color: #6b6382; font-weight: 600;">Игрок не найден 😔</div>`;
                return;
            }

            if (filteredTime.length > 0) {
                let timeHtml = `<div class="stats-card"><div class="stats-card-title">🏆 Лидеры по времени</div>`;
                filteredTime.forEach((player) => {
                    const realRank = fakeStatsData.time.findIndex(p => p.name === player.name) + 1;
                    const rankClass = realRank <= 3 ? `rank-${realRank}` : `rank-other`;

                    timeHtml += `
                        <div class="stat-row">
                            <div class="rank-circle ${rankClass}">${realRank}</div>
                            <img class="player-avatar" src="https://minotar.net/helm/${player.name}/64.png" alt="head">
                            <div class="player-info">
                                <span class="player-name">${player.name}</span>
                                <span class="player-score">${player.score}</span>
                            </div>
                        </div>`;
                });
                timeHtml += `</div>`;
                container.innerHTML += timeHtml;
            }

            if (filteredBlocks.length > 0) {
                let blocksHtml = `<div class="stats-card"><div class="stats-card-title">⛏️ Лидеры по сломанным блокам</div>`;
                filteredBlocks.forEach((player) => {
                    const realRank = fakeStatsData.blocks.findIndex(p => p.name === player.name) + 1;
                    const rankClass = realRank <= 3 ? `rank-${realRank}` : `rank-other`;

                    blocksHtml += `
                        <div class="stat-row">
                            <div class="rank-circle ${rankClass}">${realRank}</div>
                            <img class="player-avatar" src="https://minotar.net/helm/${player.name}/64.png" alt="head">
                            <div class="player-info">
                                <span class="player-name">${player.name}</span>
                                <span class="player-score">${player.score} блоков</span>
                            </div>
                        </div>`;
                });
                blocksHtml += `</div>`;
                container.innerHTML += blocksHtml;
            }
        }
    </script>
</body>
</html>
